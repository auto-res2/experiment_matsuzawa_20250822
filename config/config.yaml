# General settings
DEVICE: "cuda" # This will be overridden by main.py based on availability
NUM_SEEDS: 3
OUTPUT_DIR: ".research/iteration1/images"
DATA_DIR: "data"
MODELS_DIR: "models"

# Data generation settings
NUM_GEN_IMAGES: 50000
NUM_CLASSES: 10
GEN_BATCH_SIZE: 128
DIFFUSION_MODEL_ID: "google/ddpm-cifar10-32"

# Downstream classifier training settings
CLASSIFIER_MODEL: "resnet18"
TRAIN_EPOCHS: 50
TRAIN_BATCH_SIZE: 128
LEARNING_RATE: 0.001

# Test mode settings for quick verification
TEST_NUM_GEN_IMAGES: 64
TEST_TRAIN_EPOCHS: 2
